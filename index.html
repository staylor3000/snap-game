<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snap!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ── Level progress bar ── -->
  <div id="level-progress">
    <div id="level-progress-track">
      <div id="level-progress-fill"></div>
    </div>
    <div id="level-progress-label">Level <span id="level-progress-num">1</span> / 100</div>
  </div>

  <!-- ── Health bar HUD ── -->
  <div id="hud">
    <div class="hud-player" id="hud-cpu">
      <span class="hud-name">CPU</span>
      <div class="health-track cpu-track">
        <div class="health-fill" id="cpu-bar"></div>
      </div>
      <span class="hud-cards" id="ai-count">26</span>
    </div>

    <div id="hud-center">
      <div id="snap-streak" class="hidden">
        <span id="streak-fire">🔥</span><span id="streak-count">0</span>
      </div>
      <div id="hud-vs">VS</div>
      <div id="level-badge">LVL <span id="level-num">1</span></div>
    </div>

    <div class="hud-player" id="hud-you">
      <span class="hud-cards" id="player-count">26</span>
      <div class="health-track you-track">
        <div class="health-fill" id="player-bar"></div>
      </div>
      <span class="hud-name">YOU</span>
    </div>
  </div>

  <!-- ── Snap counters ── -->
  <div id="snap-counters">
    <div class="snap-counter" id="cpu-snap-counter">
      <span class="snap-counter-label">CPU snaps</span>
      <span class="snap-counter-value" id="cpu-snap-count">0</span>
    </div>
    <div class="snap-counter" id="player-snap-counter">
      <span class="snap-counter-value" id="player-snap-count">0</span>
      <span class="snap-counter-label">Your snaps</span>
    </div>
  </div>

  <div id="table">

    <div class="player-label" id="cpu-label"><strong>CPU</strong></div>
    <div class="card-stack" id="ai-deck-visual"><div class="stack-card"></div></div>

    <div id="pile-area">
      <div id="pile-cards">
        <div class="card empty" id="pile-card-prev"></div>
        <div class="card empty" id="pile-card-top"></div>
      </div>
      <div id="pile-count">Pile: 0 cards</div>
    </div>

    <div id="snap-stats">
      <div class="stat-header-row">
        <span></span>
        <span class="stat-col-header">Game</span>
        <span class="stat-col-header">Session</span>
      </div>
      <div class="stat-row"><span class="stat-label">Last</span><span class="stat-val" id="stat-last">—</span><span class="stat-val">—</span></div>
      <div class="stat-row"><span class="stat-label">Best</span><span class="stat-val" id="stat-best">—</span><span class="stat-val" id="stat-best-session">—</span></div>
      <div class="stat-row stat-divider"><span class="stat-label">Snaps</span><span class="stat-val" id="stat-hits">0</span><span class="stat-val" id="stat-hits-session">0</span></div>
      <div class="stat-row"><span class="stat-label">Rate</span><span class="stat-val" id="stat-rate">—</span><span class="stat-val" id="stat-rate-session">—</span></div>
      <div class="stat-row"><span class="stat-label">False</span><span class="stat-val" id="stat-misses">0</span><span class="stat-val" id="stat-misses-session">0</span></div>
    </div>

    <div class="card-stack" id="player-deck-visual"><div class="stack-card"></div></div>
    <div class="player-label" id="you-label"><strong>You</strong></div>

  </div><!-- /#table -->

  <!-- Controls -->
  <div id="controls">
    <button id="btn-flip" class="action-btn">Flip Card</button>
    <button id="btn-snap" class="action-btn" hidden>SNAP!</button>
    <div id="status-msg"></div>
  </div>

</div><!-- /#app -->

<!-- Game-over overlay -->
<div id="overlay" hidden>
  <div id="overlay-content">
    <h2 id="overlay-title"></h2>
    <p  id="overlay-body"></p>
    <p  id="overlay-level" class="hidden"></p>
    <button id="btn-play-again">Play Again</button>
  </div>
</div>

<script src="deck.js"></script>
<script src="player.js"></script>
<script src="game.js"></script>

</body>
</html>
