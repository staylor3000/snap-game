<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snap!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ── Health bar HUD ── -->
  <div id="hud">
    <div class="hud-player" id="hud-cpu">
      <span class="hud-name">CPU</span>
      <div class="health-track cpu-track">
        <div class="health-fill" id="cpu-bar"></div>
      </div>
      <span class="hud-cards" id="ai-count">26</span>
    </div>

    <div id="hud-center">
      <div id="snap-streak" class="hidden">
        <span id="streak-fire">🔥</span><span id="streak-count">0</span>
      </div>
      <div id="hud-vs">VS</div>
    </div>

    <div class="hud-player" id="hud-you">
      <span class="hud-cards" id="player-count">26</span>
      <div class="health-track you-track">
        <div class="health-fill" id="player-bar"></div>
      </div>
      <span class="hud-name">YOU</span>
    </div>
  </div>

  <!-- ── Snap counters ── -->
  <div id="snap-counters">
    <div class="snap-counter" id="cpu-snap-counter">
      <span class="snap-counter-label">CPU snaps</span>
      <span class="snap-counter-value" id="cpu-snap-count">0</span>
    </div>
    <div class="snap-counter" id="player-snap-counter">
      <span class="snap-counter-value" id="player-snap-count">0</span>
      <span class="snap-counter-label">Your snaps</span>
    </div>
  </div>

  <div id="table">

    <div class="player-label" id="cpu-label"><strong>CPU</strong></div>
    <div class="card-stack" id="ai-deck-visual"><div class="stack-card"></div></div>

    <div id="pile-area">
      <div id="pile-cards">
        <div class="card empty" id="pile-card-prev"></div>
        <div class="card empty" id="pile-card-top"></div>
      </div>
      <div id="pile-count">Pile: 0 cards</div>
    </div>

    <div class="card-stack" id="player-deck-visual"><div class="stack-card"></div></div>
    <div class="player-label" id="you-label"><strong>You</strong></div>

  </div><!-- /#table -->

  <!-- Controls -->
  <div id="controls">
    <button id="btn-flip" class="action-btn">Flip Card</button>
    <button id="btn-snap" class="action-btn" hidden>SNAP!</button>
    <div id="status-msg"></div>
  </div>

</div><!-- /#app -->

<!-- Game-over overlay -->
<div id="overlay" hidden>
  <div id="overlay-content">
    <h2 id="overlay-title"></h2>
    <p  id="overlay-body"></p>
    <button id="btn-play-again">Play Again</button>
  </div>
</div>

<script src="deck.js"></script>
<script src="player.js"></script>
<script src="game.js"></script>

</body>
</html>
